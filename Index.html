<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700;800&display=swap');
        
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --input-bg: #f8fafc;
            --border-color: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --border-color: #334155;
        }

        body { background: var(--bg-color); color: var(--text-main); font-family: 'Prompt', sans-serif; transition: 0.3s; padding: 10px; }
        .main-card { background: var(--card-bg); border-radius: 35px; max-width: 500px; margin: 30px auto; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        
        /* Dark Mode Toggle */
        .theme-switch { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .form-check-input { width: 50px; height: 25px; cursor: pointer; }

        .header-content { background: var(--card-bg); padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--border-color); }
        .header-title { font-weight: 800; background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .section-box { padding: 20px 25px; border-bottom: 1px solid var(--border-color); }
        .info-display { background: var(--input-bg); padding: 12px; border-radius: 15px; border: 1px solid var(--border-color); color: var(--text-main); min-height: 45px; }
        .form-control { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 15px; padding: 12px; }
        .form-control:focus { background: var(--input-bg); color: var(--text-main); border-color: #3b82f6; }
        
        .option-btn { flex: 1; padding: 12px; border-radius: 15px; border: 2px solid var(--border-color); background: transparent; color: var(--text-muted); font-weight: 700; transition: 0.3s; }
        .option-btn.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        
        .submit-btn { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 800; margin-top: 20px; }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 9999; color: white; text-align: center; padding-top: 50vh; }
    </style>
</head>
<body data-theme="light">
    <div class="theme-switch">
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="darkModeToggle" onchange="toggleTheme()">
            <label class="form-check-label text-muted" for="darkModeToggle"><i class="fas fa-moon"></i></label>
        </div>
    </div>

    <div id="loadingOverlay">
        <div class="spinner-border text-primary"></div>
        <div class="mt-3">กำลังประมวลผลรูปภาพและบันทึกข้อมูล...</div>
    </div>

    <div class="main-card">
        <div class="header-content"><h1 class="header-title">NEW ART. QC REPORT</h1></div>
        <form id="inspectionForm">
            <div class="section-box">
                <label class="label-title small fw-bold text-uppercase opacity-75">Article / Barcode</label>
                <div class="input-group mt-1">
                    <input type="number" id="article" class="form-control" onchange="fetchData()" placeholder="Scan Here">
                    <button class="btn btn-dark" type="button" onclick="startScan()"><i class="fas fa-barcode"></i></button>
                </div>
                <div id="reader" style="display:none; margin-top:15px; border-radius:20px; overflow:hidden;"></div>
            </div>

            <div class="section-box">
                <div class="row g-3">
                    <div class="col-12"><label class="small fw-bold opacity-75">Vendor Name</label><div id="v_vendor" class="info-display"></div></div>
                    <div class="col-12"><label class="small fw-bold opacity-75">Article Description</label><div id="v_desc" class="info-display"></div></div>
                    <div class="col-12"><label class="small fw-bold opacity-75">PO Number</label><div id="v_po" class="info-display"></div></div>
                    <div class="col-6"><label class="small fw-bold opacity-75">PO Qty</label><div id="v_qty" class="info-display"></div></div>
                    <div class="col-6"><label class="small fw-bold opacity-75">Sampling</label><div id="v_samp" class="info-display"></div></div>
                    <div class="col-12"><label class="small fw-bold opacity-75">Date</label><div id="v_date" class="info-display"></div></div>
                    <div class="col-12">
                        <label class="small fw-bold opacity-75">วันผลิต (MFD)</label>
                        <input type="date" id="mfgDate" class="form-control">
                    </div>
                </div>
            </div>

            <div class="section-box">
                <label class="small fw-bold opacity-75 mb-2 d-block">ตัวอย่างสินค้า</label>
                <div class="d-flex gap-2">
                    <button type="button" class="option-btn active" onclick="setOption('sampleStatus', 'มีตัวอย่าง', this)">มีตัวอย่าง</button>
                    <button type="button" class="option-btn" onclick="setOption('sampleStatus', 'ไม่มีตัวอย่าง', this)">ไม่มีตัวอย่าง</button>
                </div>
                <input type="hidden" id="sampleStatus" value="มีตัวอย่าง">
            </div>

            <div class="section-box">
                <label class="small fw-bold opacity-75 mb-2 d-block">ผลการตรวจสอบ</label>
                <div class="d-flex gap-2">
                    <button type="button" class="option-btn active" onclick="setOption('inspectionResult', 'ไม่พบปัญหา', this)">ไม่พบปัญหา</button>
                    <button type="button" class="option-btn" onclick="setOption('inspectionResult', 'พบปัญหา', this)">พบปัญหา</button>
                </div>
                <input type="hidden" id="inspectionResult" value="ไม่พบปัญหา">
            </div>

            <div class="section-box border-0">
                <label class="small fw-bold opacity-75">1. รูปหน้ากล่อง/มอก./สคบ.</label>
                <input type="file" id="f1" class="form-control mb-3" multiple accept="image/*">
                <label class="small fw-bold opacity-75">2. รูปมุมไกล (การปูแผ่)</label>
                <input type="file" id="f2" class="form-control mb-3" multiple accept="image/*">
                <label class="small fw-bold opacity-75">3. รูปมุมใกล้ (สีเพี้ยน)</label>
                <input type="file" id="f3" class="form-control mb-3" multiple accept="image/*">

                <button type="button" class="submit-btn" onclick="submitForm()" id="submitBtn">บันทึกข้อมูลและส่งรายงาน</button>
            </div>
        </form>
    </div>

    <input type="hidden" id="h_date"><input type="hidden" id="h_po"><input type="hidden" id="h_vendor"><input type="hidden" id="h_desc"><input type="hidden" id="h_qty"><input type="hidden" id="h_samp">

    <script>
        function toggleTheme() {
            const body = document.body;
            body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
        }

        function setOption(targetId, value, btnElement) {
            document.getElementById(targetId).value = value;
            btnElement.parentElement.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        // ปรับลดขนาดเหลือ 800px เพื่อความไว
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const maxSide = 800; 
                        if (width > height) {
                            if (width > maxSide) { height *= maxSide / width; width = maxSide; }
                        } else {
                            if (height > maxSide) { width *= maxSide / height; height = maxSide; }
                        }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            });
        }

        async function getGroupImages(id) {
            const files = document.getElementById(id).files;
            if (files.length === 0) return null;
            const promises = Array.from(files).map(async (file) => {
                const base64 = await compressImage(file);
                return { data: base64.split(',')[1], type: 'image/jpeg', name: file.name };
            });
            return await Promise.all(promises);
        }

        function fetchData() {
            var inputVal = document.getElementById('article').value;
            if (!inputVal) return;
            google.script.run.withSuccessHandler(data => {
                if (data.success) {
                    document.getElementById('article').value = data.article;
                    document.getElementById('v_vendor').innerText = data.vendor;
                    document.getElementById('v_desc').innerText = data.description;
                    document.getElementById('v_po').innerText = data.poNumber;
                    document.getElementById('v_qty').innerText = data.poQty;
                    document.getElementById('v_samp').innerText = data.sampling;
                    document.getElementById('v_date').innerText = data.date;

                    document.getElementById('h_vendor').value = data.vendor;
                    document.getElementById('h_po').value = data.poNumber;
                    document.getElementById('h_date').value = data.date;
                    document.getElementById('h_desc').value = data.description;
                    document.getElementById('h_qty').value = data.poQty;
                    document.getElementById('h_samp').value = data.sampling;
                } else { alert(data.error); }
            }).getProductData(inputVal);
        }

        async function submitForm() {
            if (!document.getElementById('mfgDate').value) { alert("กรุณาระบุวันผลิต (MFD)"); return; }
            
            document.getElementById('loadingOverlay').style.display = 'block';
            const btn = document.getElementById('submitBtn'); btn.disabled = true;
            
            try {
                const payload = {
                    article: document.getElementById('article').value,
                    date: document.getElementById('h_date').value,
                    poNumber: document.getElementById('h_po').value,
                    vendor: document.getElementById('h_vendor').value,
                    description: document.getElementById('h_desc').value,
                    poQty: document.getElementById('h_qty').value,
                    sampling: document.getElementById('h_samp').value,
                    mfgDate: document.getElementById('mfgDate').value,
                    inspectionResult: document.getElementById('inspectionResult').value,
                    sampleStatus: document.getElementById('sampleStatus').value,
                    group1: await getGroupImages('f1'),
                    group2: await getGroupImages('f2'),
                    group3: await getGroupImages('f3')
                };
                
                google.script.run.withSuccessHandler(function(res) {
                    if(res.success) {
                        alert(res.message);
                        location.reload(); 
                    } else { alert("เกิดข้อผิดพลาด: " + res.message); }
                    document.getElementById('loadingOverlay').style.display = 'none';
                    btn.disabled = false;
                }).processForm(payload);
            } catch (e) { alert("Error: " + e); document.getElementById('loadingOverlay').style.display = 'none'; btn.disabled = false; }
        }

        function startScan() {
            const html5QrCode = new Html5Qrcode("reader");
            document.getElementById('reader').style.display = 'block';
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (text) => {
                    document.getElementById('article').value = text;
                    fetchData();
                    html5QrCode.stop();
                    document.getElementById('reader').style.display = 'none';
                }, () => {}
            ).catch(err => alert("กล้องมีปัญหา: " + err));
        }
    </script>
</body>
</html>
